services:
  # 1. خادم الـ API الرئيسي
  - type: web
    name: krb-security-api
    env: node
    plan: starter
    buildCommand: npm install && npm run build:api
    startCommand: npm run start:api
    envVars:
      - key: MONGO_URI
        fromDatabase:
          name: krb-security-db
          property: connectionString
      - key: REDIS_URL
        fromKeyValueStore:
          name: krb-security-cache
          property: connectionString

  # 2. عامل تشغيل البوت المباشر (Worker Node)
  - type: worker
    name: krb-security-bot
    env: node
    plan: starter
    buildCommand: npm install && npm run build:bot
    startCommand: npm run start:bot
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: MONGO_URI
        fromDatabase:
          name: krb-security-db
          property: connectionString
      - key: REDIS_URL
        fromKeyValueStore:
          name: krb-security-cache
          property: connectionString

databases:
  - name: krb-security-db
    plan: free

keyValueStores:
  - name: krb-security-cache
    type: redis
    plan: free
